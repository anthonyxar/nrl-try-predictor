services:
  backend:
    build: ./backend
    container_name: nrl-backend
    ports:
      - "8000:8000"
    volumes:
      - nrl-data:/app/data
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: nrl-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nrl-data:
